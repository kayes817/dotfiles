$mod = SUPER
$terminal = alacritty
$browser = brave
$fileManager = thunar
$menu = sh -lc "$HOME/.local/bin/app-launcher"
$lock = sh -lc "$HOME/.local/bin/lockscreen"

monitor = ,preferred,auto,1

env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24
env = NIXOS_OZONE_WL,1
env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_RENDERER_ALLOW_SOFTWARE,1
env = LIBGL_ALWAYS_SOFTWARE,1

exec-once = sh -lc "$HOME/.local/bin/wallpaperctl apply"
exec-once = nm-applet --indicator
exec-once = pasystray
exec-once = dunst
exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1
exec-once = sh -lc 'waybar -c "$HOME/.config/waybar/config.jsonc" -s "$HOME/.config/waybar/current-style.css"'

input {
  kb_layout = us
  follow_mouse = 1
  touchpad {
    natural_scroll = false
  }
}

general {
  gaps_in = 10
  gaps_out = 4
  border_size = 2
  col.active_border = rgb(88c0d0)
  col.inactive_border = rgb(4c566a)
  resize_on_border = true
  layout = dwindle
}

decoration {
  rounding = 0
  active_opacity = 1.0
  inactive_opacity = 0.95

  shadow {
    enabled = true
    range = 18
    render_power = 3
    color = rgba(88c0d033)
  }

  blur {
    enabled = true
    size = 6
    passes = 2
    new_optimizations = true
    ignore_opacity = true
    xray = false
  }
}

animations {
  enabled = true

  bezier = smooth, 0.22, 1.0, 0.36, 1.0
  bezier = soft, 0.25, 0.1, 0.25, 1.0

  animation = windows, 1, 6, smooth, slide
  animation = windowsOut, 1, 5, soft, slide
  animation = border, 1, 8, soft
  animation = fade, 1, 6, soft
  animation = workspaces, 1, 6, smooth, slidefade
}

dwindle {
  pseudotile = true
  preserve_split = true
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
}

bind = $mod, Return, exec, $terminal
bind = $mod SHIFT, Return, exec, alacritty --class floating-term
bind = $mod, D, exec, $menu
bind = $mod, B, exec, $browser
bind = $mod SHIFT, F, exec, $browser
bind = $mod, E, exec, $fileManager
bind = $mod ALT, L, exec, $lock
bind = $mod, Q, killactive,
bind = $mod SHIFT, Q, exit,
bind = $mod SHIFT, E, exit,
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, R, exec, hyprctl reload

bind = , Print, exec, grim - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioMicMute, exec, pamixer --default-source -t
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

bind = $mod, V, togglesplit,
bind = $mod, F, fullscreen, 0
bind = $mod, P, pseudo,
bind = $mod CTRL, P, exec, sh -lc "$HOME/.local/bin/float-workspace"
bind = $mod CTRL SHIFT, P, exec, sh -lc "$HOME/.local/bin/unfloat-workspace"
bind = $mod CTRL, T, bringactivetotop
bind = $mod CTRL, N, exec, sh -lc "$HOME/.local/bin/wallpaperctl next"
bind = $mod CTRL SHIFT, N, exec, sh -lc "$HOME/.local/bin/wallpaperctl prev"
bind = $mod, S, togglespecialworkspace,
bind = $mod SHIFT, S, pin,
bind = $mod, A, layoutmsg, cyclenext
bind = $mod, SPACE, cyclenext
bind = $mod, TAB, workspace, previous
bind = ALT, TAB, cyclenext
bind = ALT SHIFT, TAB, cyclenext, prev
bind = $mod, bracketleft, workspace, e-1
bind = $mod, bracketright, workspace, e+1
bind = $mod SHIFT, SPACE, togglefloating,
bind = $mod CTRL, SPACE, exec, sh -lc "$HOME/.local/bin/float-only"
bind = $mod SHIFT, M, exec, sh -lc "$HOME/.local/bin/center-window"
bind = $mod SHIFT, V, exec, sh -lc "$HOME/.local/bin/float-center"
bind = $mod CTRL, H, exec, hyprctl dispatch moveactive -40 0
bind = $mod CTRL, J, exec, hyprctl dispatch moveactive 0 40
bind = $mod CTRL, K, exec, hyprctl dispatch moveactive 0 -40
bind = $mod CTRL, L, exec, hyprctl dispatch moveactive 40 0
bind = $mod SHIFT, minus, movetoworkspace, special
bind = $mod, minus, togglespecialworkspace,

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

binde = $mod CTRL, left, resizeactive, -40 0
binde = $mod CTRL, right, resizeactive, 40 0
binde = $mod CTRL, up, resizeactive, 0 -40
binde = $mod CTRL, down, resizeactive, 0 40
